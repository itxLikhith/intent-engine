global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'unified-search'
    static_configs:
      - targets: ['unified-search-api:8082']
    metrics_path: '/metrics'

  - job_name: 'intent-engine-api'
    static_configs:
      - targets: ['intent-engine-api:8000']
    metrics_path: '/metrics'

  - job_name: 'go-search-api'
    static_configs:
      - targets: ['go-search-api:8080']
    metrics_path: '/metrics'

  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
