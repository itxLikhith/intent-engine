version: '3.8'

# =============================================================================
# Intent Engine - Go Crawler & Indexer (Integrated with existing Intent Engine)
# =============================================================================
# Extends existing Intent Engine with Go-based crawler and indexer
# Shares Redis and PostgreSQL with main Intent Engine
# =============================================================================

services:
  # ===========================================================================
  # Search API Service (Go + Bleve)
  # ===========================================================================
  go-search-api:
    build:
      context: ./go-crawler
      dockerfile: deployments/Dockerfile.api
    container_name: intent-go-search-api
    ports:
      - "8081:8080"
    environment:
      - BLEVE_PATH=/data/bleve
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - POSTGRES_DSN=postgresql://intent_user:intent_secure_password_change_in_prod@postgres:5432/intent_engine?sslmode=disable
      - BADGER_PATH=/data/badger
      - REDIS_ADDR=redis:6379
    volumes:
      - go-api-data:/data
    networks:
      - intent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # ===========================================================================
  # Crawler Service (Go + Colly)
  # ===========================================================================
  go-crawler:
    build:
      context: ./go-crawler
      dockerfile: deployments/Dockerfile.crawler
    container_name: intent-go-crawler
    environment:
      - REDIS_ADDR=redis:6379
      - POSTGRES_DSN=postgresql://intent_user:intent_secure_password_change_in_prod@postgres:5432/intent_engine?sslmode=disable
      - BADGER_PATH=/data/badger
    volumes:
      - go-crawler-data:/data
    networks:
      - intent-network
      - searxng
    restart: unless-stopped
    command: >
      ./crawler
      -redis=redis:6379
      -postgres=postgresql://intent_user:intent_secure_password_change_in_prod@postgres:5432/intent_engine?sslmode=disable
      -badger=/data/badger
      -seed=https://go.dev,https://golang.org
      -max-pages=100
      -max-depth=2
      -concurrency=3
      -delay=2000

  # ===========================================================================
  # Indexer Service (Go + Bleve)
  # ===========================================================================
  go-indexer:
    build:
      context: ./go-crawler
      dockerfile: deployments/Dockerfile.indexer
    container_name: intent-go-indexer
    environment:
      - REDIS_ADDR=redis:6379
      - POSTGRES_DSN=postgresql://intent_user:intent_secure_password_change_in_prod@postgres:5432/intent_engine?sslmode=disable
      - BLEVE_PATH=/data/bleve
    volumes:
      - go-indexer-data:/data
    networks:
      - intent-network
    restart: unless-stopped
    command: >
      ./indexer
      -redis=redis:6379
      -postgres=postgresql://intent_user:intent_secure_password_change_in_prod@postgres:5432/intent_engine?sslmode=disable
      -bleve=/data/bleve
      -batch-size=50
      -interval=60

networks:
  intent-network:
    external: true
    name: intent-engine_intent-network
  searxng:
    external: true
    name: intent-engine_searxng

volumes:
  go-api-data:
  go-crawler-data:
  go-indexer-data:
