version: "3.8"

services:
  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "
        echo 'Waiting for PostgreSQL...' &&
        until pg_isready -h postgres -U intent_user -d intent_engine; do
          sleep 2
        done &&
        echo 'Running database initialization...' &&
        python /app/scripts/init_db_standalone.py &&
        echo 'Running SQL migrations...' &&
        psql -h postgres -U intent_user -d intent_engine -f /app/migrations/001_create_missing_tables.sql || true &&
        psql -h postgres -U intent_user -d intent_engine -f /app/migrations/002_fix_click_tracking.sql || true &&
        psql -h postgres -U intent_user -d intent_engine -f /app/migrations/003_fix_conversion_fraud.sql || true &&
        psql -h postgres -U intent_user -d intent_engine -f /app/migrations/004_fix_ab_tests.sql || true &&
        echo 'Migrations complete!'
      "
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=intent_user
      - POSTGRES_PASSWORD=intent_secure_password_change_in_prod
      - POSTGRES_DB=intent_engine
      - PGPASSWORD=intent_secure_password_change_in_prod
    networks:
      - intent-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  intent-engine-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://intent_user:intent_secure_password_change_in_prod@postgres:5432/intent_engine
      - PGBOUNCER_ENABLED=false
      - DATABASE_POOL_SIZE=10
      - DATABASE_MAX_OVERFLOW=20
      - DATABASE_POOL_TIMEOUT=30
      - DATABASE_POOL_RECYCLE=1800
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_MAX_CONNECTIONS=50
      - REDIS_TIMEOUT=5.0
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - ENABLE_CORS=true
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080,https://yourdomain.com
      - CORS_ALLOW_CREDENTIALS=true
      - CORS_ALLOW_METHODS=GET,POST,PUT,DELETE,OPTIONS
      - CORS_ALLOW_HEADERS=Authorization,Content-Type,X-Requested-With
      - SECRET_KEY=change-this-to-a-secure-random-string-in-production
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_DEFAULT=100/minute
      - RATE_LIMIT_STRICT=10/minute
      - SEARXNG_BASE_URL=http://searxng:8080
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - intent-network
      - searxng
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_started

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    networks:
      - searxng
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  # Go Search API - provides search functionality for Go documentation
  # Note: This service requires Go source code which is not in this repository
  go-search-api:
    build:
      context: ./go-crawler
      dockerfile: deployments/Dockerfile.api
    container_name: intent-go-search-api
    profiles: ["go-crawler"]
    ports:
      - "8081:8080"
    environment:
      - BLEVE_PATH=/data/bleve
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - POSTGRES_DSN=postgresql://intent_user:intent_secure_password_change_in_prod@postgres:5432/intent_engine?sslmode=disable
      - BADGER_PATH=/data/badger
      - REDIS_ADDR=redis:6379
    volumes:
      - go-api-data:/data
    networks:
      - intent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Go Crawler - crawls Go documentation websites
  # Note: This service requires Go source code which is not in this repository
  go-crawler:
    build:
      context: ./go-crawler
      dockerfile: deployments/Dockerfile.crawler
    container_name: intent-go-crawler
    profiles: ["go-crawler"]
    environment:
      - REDIS_ADDR=redis:6379
      - POSTGRES_DSN=postgresql://intent_user:intent_secure_password_change_in_prod@postgres:5432/intent_engine?sslmode=disable
      - BADGER_PATH=/data/badger
    volumes:
      - go-crawler-data:/data
    networks:
      - intent-network
      - searxng
    restart: unless-stopped
    command: >
      ./crawler
      -redis=redis:6379
      -postgres=postgresql://intent_user:intent_secure_password_change_in_prod@postgres:5432/intent_engine?sslmode=disable
      -badger=/data/badger
      -seed=https://go.dev,https://golang.org
      -max-pages=100
      -max-depth=2
      -concurrency=3
      -delay=2000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Go Indexer - indexes crawled content into Bleve search index
  # Note: This service requires Go source code which is not in this repository
  go-indexer:
    build:
      context: ./go-crawler
      dockerfile: deployments/Dockerfile.indexer
    container_name: intent-go-indexer
    profiles: ["go-crawler"]
    environment:
      - REDIS_ADDR=redis:6379
      - POSTGRES_DSN=postgresql://intent_user:intent_secure_password_change_in_prod@postgres:5432/intent_engine?sslmode=disable
      - BLEVE_PATH=/data/bleve
    volumes:
      - go-indexer-data:/data
    networks:
      - intent-network
    restart: unless-stopped
    command: >
      ./indexer
      -redis=redis:6379
      -postgres=postgresql://intent_user:intent_secure_password_change_in_prod@postgres:5432/intent_engine?sslmode=disable
      -bleve=/data/bleve
      -batch-size=50
      -interval=60
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: docker.io/valkey/valkey:8-alpine
    container_name: intent-redis
    command: valkey-server --save 30 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - intent-network
      - searxng
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    image: postgres:15-alpine
    container_name: intent-engine-postgres
    environment:
      - POSTGRES_USER=intent_user
      - POSTGRES_PASSWORD=intent_secure_password_change_in_prod
      - POSTGRES_DB=intent_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - intent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intent_user -d intent_engine"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional services via profiles
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: arq worker.WorkerSettings
    profiles: ["worker"]
    environment:
      - DATABASE_URL=postgresql://intent_user:intent_secure_password_change_in_prod@postgres:5432/intent_engine
      - PGBOUNCER_ENABLED=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - intent-network
      - searxng
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  pgbouncer:
    image: edoburu/pgbouncer
    container_name: intent-pgbouncer
    profiles: ["pgbouncer"]
    ports:
      - "6543:6543"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    networks:
      - intent-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6543 -U intent_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: intent-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - intent-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:10.2.0
    container_name: intent-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=grafana_secure_password_change_in_prod
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - intent-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  intent-network:
    driver: bridge
  searxng:
    driver: bridge

volumes:
  postgres_data:
  valkey-data:
  prometheus_data:
  grafana_data:
  go-api-data:
  go-crawler-data:
  go-indexer-data:
