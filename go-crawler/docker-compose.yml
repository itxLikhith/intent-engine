version: '3.8'

# =============================================================================
# Intent Engine - Go Crawler & Indexer + Python Intent Engine Integration
# =============================================================================
# Production-ready search infrastructure with:
# - Go Crawler (Colly-based)
# - Go Indexer (Bleve search)
# - Go Search API
# - Integration with Python Intent Engine
#
# Quick Start:
#   docker-compose up -d
#   sleep 30
#   curl http://localhost:8081/health
# =============================================================================

services:
  # ===========================================================================
  # Search API Service (Go + Bleve)
  # ===========================================================================
  search-api:
    build:
      context: .
      dockerfile: deployments/Dockerfile.api
    container_name: intent-search-api
    ports:
      - "8081:8080"
    environment:
      - BLEVE_PATH=/data/bleve
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - POSTGRES_DSN=postgresql://crawler:crawler@postgres:5432/intent_engine?sslmode=disable
      - BADGER_PATH=/data/badger
      - REDIS_ADDR=redis:6379
    volumes:
      - api_data:/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - intent-network
      - searxng
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # ===========================================================================
  # Crawler Service (Go + Colly)
  # ===========================================================================
  crawler:
    build:
      context: .
      dockerfile: deployments/Dockerfile.crawler
    container_name: intent-crawler
    environment:
      - REDIS_ADDR=redis:6379
      - POSTGRES_DSN=postgresql://crawler:crawler@postgres:5432/intent_engine?sslmode=disable
      - BADGER_PATH=/data/badger
    volumes:
      - crawler_data:/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - intent-network
      - searxng
    restart: unless-stopped
    command: >
      ./crawler
      -redis=redis:6379
      -postgres=postgresql://crawler:crawler@postgres:5432/intent_engine?sslmode=disable
      -badger=/data/badger
      -seed=https://go.dev,https://golang.org
      -max-pages=500
      -max-depth=3
      -concurrency=5
      -delay=1000

  # ===========================================================================
  # Indexer Service (Go + Bleve)
  # ===========================================================================
  indexer:
    build:
      context: .
      dockerfile: deployments/Dockerfile.indexer
    container_name: intent-indexer
    environment:
      - REDIS_ADDR=redis:6379
      - POSTGRES_DSN=postgresql://crawler:crawler@postgres:5432/intent_engine?sslmode=disable
      - BLEVE_PATH=/data/bleve
    volumes:
      - indexer_data:/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - intent-network
    restart: unless-stopped
    command: >
      ./indexer
      -redis=redis:6379
      -postgres=postgresql://crawler:crawler@postgres:5432/intent_engine?sslmode=disable
      -bleve=/data/bleve
      -batch-size=50
      -interval=30

  # ===========================================================================
  # Redis - URL Queue & Deduplication
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: intent-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - intent-network
      - searxng
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # PostgreSQL - Page Metadata Storage
  # ===========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: intent-postgres
    environment:
      - POSTGRES_USER=crawler
      - POSTGRES_PASSWORD=crawler
      - POSTGRES_DB=intent_engine
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployments/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - intent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler -d intent_engine"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # ===========================================================================
  # SearXNG - Fallback Search (Optional)
  # ===========================================================================
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: intent-searxng
    restart: unless-stopped
    networks:
      - searxng
    ports:
      - "8082:8080"
    volumes:
      - ../searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
      - SEARXNG_SECRET_KEY=a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6
      - SEARXNG_LIMITER=false
      - SEARXNG_IMAGE_PROXY=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  intent-network:
    driver: bridge
  searxng:
    driver: bridge

volumes:
  api_data:
  crawler_data:
  indexer_data:
  redis_data:
  postgres_data:
