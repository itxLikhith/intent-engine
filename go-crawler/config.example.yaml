# Intent Engine Go Crawler Configuration

# Crawler Settings
crawler:
  # Concurrency settings
  max_concurrent_requests: 10
  max_connections_per_host: 2
  
  # Crawling limits
  max_pages: 10000
  max_depth: 5
  max_pages_per_domain: 1000
  
  # Timing settings
  request_timeout: 30s
  crawl_delay: 1s
  random_delay: 500ms
  respect_robots_txt: true
  user_agent: "IntentEngineBot/1.0 (+https://github.com/itxLikhith/intent-engine)"
  
  # Content settings
  max_content_size: 10485760  # 10MB
  allowed_content_types:
    - "text/html"
    - "application/xhtml+xml"
  
  # Domain filtering
  allowed_domains: []  # Empty = all domains allowed
  blocked_domains:
    - "facebook.com"
    - "twitter.com"
    - "instagram.com"
    - "linkedin.com"
  
  # URL patterns to skip
  skip_url_patterns:
    - "\\.(jpg|jpeg|png|gif|svg|ico|webp)$"
    - "\\.(pdf|doc|docx|xls|xlsx|ppt|pptx)$"
    - "\\.(zip|rar|tar|gz|7z)$"
    - "\\.(mp3|mp4|avi|mov|wmv)$"
    - "\\.(css|js|woff|woff2|ttf|eot)$"
    - "\\/(login|signup|register|checkout|cart)"
    - "\\?.*(session|token|auth)="

# Redis Configuration
redis:
  addr: "localhost:6379"
  password: ""
  db: 0

# PostgreSQL Configuration
postgres:
  dsn: "postgresql://user:pass@localhost:5432/intent_engine"

# Storage Configuration
storage:
  badger_path: "./data/badger"
  bleve_path: "./data/bleve"

# API Server Configuration
server:
  host: "0.0.0.0"
  port: "8080"
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

# PageRank Configuration
pagerank:
  damping: 0.85
  iterations: 20
  tolerance: 0.001

# Logging Configuration
logging:
  level: "info"
  format: "json"
  output: "stdout"

# Metrics Configuration
metrics:
  enabled: true
  port: "9090"

# Seed URLs (initial URLs to start crawling)
seed_urls:
  - "https://example.com"
  - "https://golang.org"
  - "https://go.dev"
